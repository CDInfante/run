# Workflow to update all static data files
name: 🔄 Update Data
on:
  schedule:
    - cron: "0 */1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    name: "🔄 Update Ships, Trails, and Amenities"
    steps:
      - name: "🐧 Checkout code"
        uses: actions/checkout@v6
      - name: "⚙️ Set up Node.js"
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: 'npm'
      - name: "📦 Install dependencies"
        run: npm install
        
      - name: "🚢 Run ship scraper"
        run: node scripts/scrape-ships.ts
        continue-on-error: true
        id: scrape-ships
      - name: "🥾 Run trail scraper"
        run: node scripts/scrape-trails.ts
        continue-on-error: true
        id: scrape-trails
      - name: "⛲ Run amenity scraper"
        run: node scripts/scrape-amenities.ts
        continue-on-error: true
        id: scrape-amenities
      - name: "🌊 Run marine scraper"
        run: node scripts/scrape-marine.ts
        continue-on-error: true
        id: scrape-marine
      - name: "🔄 Commit changes"
        if: always()
        run: |
          git config --global user.name "HarryVasanth"
          git config --global user.email "hello@harryvasanth.com"
          git add public/ships-funchal.json public/trails-madeira.json public/amenities.json public/marine-data.json
          if git diff --staged --quiet; then
            echo "No changes in data."
          else
            git commit -m "chore(data): 🔄 update ship, trail, amenity, and marine data"
            git push
          fi
      - name: "❌ Fail if any scraper failed"
        if: always()
        run: |
          test "${{ steps.scrape-ships.outcome }}" = "success" &&
          test "${{ steps.scrape-trails.outcome }}" = "success" &&
          test "${{ steps.scrape-amenities.outcome }}" = "success" &&
          test "${{ steps.scrape-marine.outcome }}" = "success"